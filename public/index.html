<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Task Manager</h1>
      <p class="subtitle">CloudTech Solutions</p>
    </div>

    <div id="auth-box">
      <div id="login-form">
        <h2>Iniciar Sesion</h2>
        <input type="text" id="login-user" placeholder="Usuario" autocomplete="username">
        <input type="password" id="login-pass" placeholder="Contrasena" autocomplete="current-password">
        <button id="login-btn" onclick="handleLogin()">Entrar</button>
        <p class="auth-switch">No tienes cuenta? <a href="#" onclick="showRegister()">Registrate</a></p>
      </div>

      <div id="register-form" style="display:none">
        <h2>Crear Cuenta</h2>
        <input type="text" id="reg-user" placeholder="Usuario" autocomplete="username">
        <input type="password" id="reg-pass" placeholder="Contrasena (min 4 caracteres)" autocomplete="new-password">
        <button id="reg-btn" onclick="handleRegister()">Crear cuenta</button>
        <p class="auth-switch">Ya tienes cuenta? <a href="#" onclick="showLogin()">Iniciar sesion</a></p>
      </div>

      <div id="auth-error" class="error" style="display:none"></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
</body>
</html>
