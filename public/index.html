<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>
    <p class="subtitle">CloudTech Solutions</p>

    <div id="auth-box">
      <div id="login-form">
        <h2>Login</h2>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="login()">Entrar</button>
        <p>No tienes cuenta? <a href="#" onclick="showRegister()">Registrate</a></p>
      </div>

      <div id="register-form" style="display:none">
        <h2>Registro</h2>
        <input type="text" id="reg-user" placeholder="Username">
        <input type="password" id="reg-pass" placeholder="Password">
        <button onclick="register()">Crear cuenta</button>
        <p>Ya tienes cuenta? <a href="#" onclick="showLogin()">Login</a></p>
      </div>

      <p id="auth-error" class="error"></p>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    function showRegister() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
    }
    function showLogin() {
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
    }
    async function login() {
      const username = document.getElementById('login-user').value;
      const password = document.getElementById('login-pass').value;
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/dashboard.html';
      } else {
        document.getElementById('auth-error').textContent = data.error;
      }
    }
    async function register() {
      const username = document.getElementById('reg-user').value;
      const password = document.getElementById('reg-pass').value;
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/dashboard.html';
      } else {
        document.getElementById('auth-error').textContent = data.error;
      }
    }
  </script>
</body>
</html>
